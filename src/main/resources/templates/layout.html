<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <title>Layout</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<nav class="navbar navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand" th:href="@{/index}">Application Contacts</a>
    <ul class="navbar-nav flex-row">
      <li class="nav-item me-3">
        <a class="nav-link" th:href="@{/index}">Ajouter un contact</a>
      </li>
      <li class="nav-item" th:if="${session.loggedUser == null}">
        <a class="nav-link" th:href="@{/login}">Se connecter</a>
      </li>
      <li class="nav-item" th:if="${session.loggedUser != null}">
        <span class="navbar-text me-2">Bonjour, <span th:text="${session.loggedUser}">Utilisateur</span></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
          <button type="submit" class="btn btn-link nav-link" style="display:inline; padding:0; border:none;">Se déconnecter</button>
        </form>
      </li>
    </ul>
  </div>
</nav>

  <section layout:fragment="content">
    <!-- Ici le contenu des pages sera injecté -->
  </section>

</body>
</html>
